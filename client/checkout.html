<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { font-family:system-ui,-apple-system,sans-serif; background:#0a0a0f; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center }
.panel { background:linear-gradient(145deg,#111,#1a1a2e); border:1px solid #2a2a4a; border-radius:20px; padding:32px; width:100%; max-width:480px; margin:20px }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px }
.header h1 { font-size:22px; background:linear-gradient(135deg,#00d4ff,#8b5cf6); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text }
.badge { background:#2a2a4a; color:#888; padding:4px 10px; border-radius:20px; font-size:12px }
.summary { background:#0d0d1e; border-radius:12px; padding:16px; margin-bottom:20px }
.summary-row { display:flex; justify-content:space-between; padding:8px 0 }
.summary-row:not(:last-child) { border-bottom:1px solid #1a1a2e }
.summary-label { color:#888; font-size:13px }
.summary-value { color:#fff; font-size:14px; font-weight:600 }
.price { color:#e94560; font-size:24px; font-weight:700 }
.form-group { margin-bottom:14px }
.form-group label { display:block; color:#888; font-size:13px; margin-bottom:6px }
.form-group input { width:100%; padding:12px 16px; background:#0d0d1e; border:1px solid #2a2a4a; border-radius:10px; color:#fff; font-size:14px; outline:none }
.form-group input:focus { border-color:#00d4ff }
.separator { border:none; border-top:1px solid #1a1a2e; margin:16px 0 }
.points-card { background:linear-gradient(135deg,#0d0d1e,#1a1a2e); border:1px solid #2a2a4a; border-radius:12px; padding:16px; margin-bottom:16px }
.points-balance { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px }
.points-amount { font-size:20px; font-weight:700 }
.points-amount.enough { color:#00cc66 }
.points-amount.low { color:#f59e0b }
.points-label { color:#888; font-size:13px }
.points-action { margin-top:10px }
.btn-points-full { width:100%; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; background:linear-gradient(135deg,#00cc66,#059669); color:#fff; transition:opacity 0.2s }
.btn-points-full:hover { opacity:0.9 }
.btn-get-points { width:100%; padding:12px; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; background:linear-gradient(135deg,#f59e0b,#ef4444); color:#fff; transition:opacity 0.2s; display:flex; align-items:center; justify-content:center; gap:8px }
.btn-get-points:hover { opacity:0.9 }
.options { display:flex; flex-direction:column; gap:10px }
.option-btn { display:flex; align-items:center; gap:14px; padding:16px; border:2px solid #2a2a4a; border-radius:12px; cursor:pointer; background:#0d0d1e; color:#fff; font-size:15px; transition:all 0.2s; width:100%; text-align:left }
.option-btn:hover { border-color:#00d4ff; background:#111128 }
.option-btn.selected { border-color:#00d4ff; background:#111128 }
.option-btn:disabled { opacity:0.4; cursor:not-allowed }
.option-icon { font-size:28px; width:40px; text-align:center }
.option-info { flex:1 }
.option-label { font-weight:600; font-size:14px }
.option-desc { color:#666; font-size:12px; margin-top:2px }
.option-tag { font-size:11px; padding:2px 8px; border-radius:4px; background:#2a2a4a; color:#888 }
.btn-primary { width:100%; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; transition:opacity 0.2s; margin-top:12px }
.btn-primary:hover { opacity:0.9 }
.btn-paypal { background:#0070ba; color:#fff }
.btn-stripe { background:#635bff; color:#fff }
.btn-secondary { width:100%; padding:12px; background:none; border:1px solid #2a2a4a; border-radius:10px; color:#666; font-size:13px; cursor:pointer; margin-top:8px; transition:color 0.2s }
.btn-secondary:hover { color:#fff; border-color:#444 }
.error { color:#e94560; font-size:13px; padding:8px 12px; background:#2a1520; border-radius:6px; margin-bottom:12px; display:none }
.loading { text-align:center; padding:40px; color:#666 }
.spinner { width:32px; height:32px; border:3px solid #2a2a4a; border-top-color:#00d4ff; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px }
@keyframes spin { to { transform:rotate(360deg) } }
.success-icon { font-size:48px; margin-bottom:12px }
.manual-details { background:#0d0d1e; border-radius:8px; padding:12px; font-size:13px; margin-bottom:12px; word-break:break-all }
.manual-details div { padding:6px 0; border-bottom:1px solid #1a1a2e; color:#ccc }
.manual-details div:last-child { border:none }
.manual-details strong { color:#888 }
.notice { background:#1a2a1a; border:1px solid #2a4a2a; border-radius:8px; padding:8px 12px; font-size:11px; color:#81c784; margin-bottom:12px; display:none }
.processing-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:1000 }
.processing-box { background:#1a1a2e; border:1px solid #2a2a4a; border-radius:16px; padding:40px; text-align:center; max-width:360px }
.processing-box .spinner { width:48px; height:48px; border-width:4px }
.processing-box h3 { margin:16px 0 8px; font-size:18px }
.processing-box p { color:#888; font-size:13px }
</style>
</head>
<body>

<div class="processing-overlay" id="processingOverlay">
  <div class="processing-box">
    <div class="spinner"></div>
    <h3>Processing Payment...</h3>
    <p id="processingMsg">Trying your preferred method</p>
  </div>
</div>

<div class="panel" id="app">
  <div class="header">
    <h1>Checkout</h1>
    <span class="badge">Secure</span>
  </div>

  <div id="loading-view" class="loading">
    <div class="spinner"></div>
    <div>Loading...</div>
  </div>

  <div id="checkout-view" style="display:none">
    <div class="summary" id="planSummary"></div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
    </div>

    <hr class="separator">

    <div id="pointsSection"></div>

    <hr class="separator" id="methodSeparator" style="display:none">

    <div id="methodSection" style="display:none">
      <div style="font-size:13px;color:#888;margin-bottom:10px">Pay with card or PayPal:</div>
      <div class="options">
        <button class="option-btn" data-method="paypal" onclick="selectMethod('paypal')">
          <span class="option-icon">🅿️</span>
          <span class="option-info">
            <div class="option-label">PayPal</div>
            <div class="option-desc">Pay with your PayPal account</div>
          </span>
        </button>
        <button class="option-btn" data-method="stripe" onclick="selectMethod('stripe')">
          <span class="option-icon">💳</span>
          <span class="option-info">
            <div class="option-label">Credit Card</div>
            <div class="option-desc">Visa, Mastercard — processed securely</div>
          </span>
        </button>
      </div>

      <button class="btn-primary" id="payBtn" onclick="pay()" disabled>Continue to Payment</button>
    </div>

    <div id="error" class="error"></div>
    <button class="btn-secondary" onclick="goBack()">Cancel</button>
  </div>

  <div id="success-view" style="display:none;text-align:center;padding:20px">
    <div class="success-icon">✅</div>
    <h2 style="margin-bottom:8px;font-size:20px">Payment Successful!</h2>
    <p style="color:#81c784;font-size:14px;margin-bottom:20px" id="successMsg">Your order has been processed.</p>
    <button class="btn-primary btn-stripe" onclick="done()">Done</button>
  </div>

  <div id="manual-view" style="display:none;text-align:center;padding:10px">
    <div style="font-size:36px;margin-bottom:12px">📋</div>
    <h2 style="margin-bottom:8px;font-size:18px">Complete Your Payment</h2>
    <p style="color:#888;font-size:13px;margin-bottom:16px" id="manualDesc">Use the details below</p>
    <div class="manual-details" id="manualDetails"></div>
    <button class="btn-secondary" onclick="showCheckout()">Back</button>
  </div>
</div>

<script>
let state = { plan: null, email: '', points: 0, selectedMethod: '', processing: false }

function updatePoints() {
  const email = document.getElementById('emailInput').value.trim()
  state.email = email
  renderPoints()
  if (!email || !email.includes('@')) return
  fetch('/api/credits/' + encodeURIComponent(email))
    .then(r => r.json())
    .then(d => {
      state.points = (d.balance || 0) / 100
      renderPoints()
    })
    .catch(() => {})
}

function renderPoints() {
  const section = document.getElementById('pointsSection')
  const price = parseFloat(state.plan?.price_sell || 0)
  const hasEnough = state.points >= price

  let html = '<div class="points-card">'
  html += '<div class="points-balance">'
  if (state.points > 0) {
    html += '<div><div class="points-label">Your Balance</div><div class="points-amount ' + (hasEnough ? 'enough' : 'low') + '">' + state.points.toFixed(0) + ' pts <span style="font-size:13px;color:#888;font-weight:400">(€' + state.points.toFixed(2) + ')</span></div></div>'
    html += '<div>' + (hasEnough ? '<span style="color:#00cc66;font-size:13px">✅ Enough</span>' : '<span style="color:#f59e0b;font-size:13px">⚠️ Need €' + (price - state.points).toFixed(2) + '</span>') + '</div>'
  } else {
    html += '<div><div class="points-label">Points</div><div class="points-amount low">0 pts</div></div>'
    html += '<div><span style="color:#888;font-size:13px">⚡ No points</span></div>'
  }
  html += '</div>'

  if (hasEnough && state.points > 0) {
    html += '<div class="points-action"><button class="btn-points-full" onclick="payWithPoints()">⭐ Pay with Points (€' + price.toFixed(2) + ')</button></div>'
  }
  html += '<div class="points-action"><button class="btn-get-points" onclick="getPoints()">⚡ Get Points via PayPal</button></div>'
  html += '</div>'

  section.innerHTML = html

  document.getElementById('methodSeparator').style.display = 'block'
  document.getElementById('methodSection').style.display = 'block'
}

function selectMethod(method) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'))
  document.querySelector('.option-btn[data-method="' + method + '"]').classList.add('selected')
  state.selectedMethod = method
  document.getElementById('payBtn').disabled = false
  if (method === 'paypal') {
    document.getElementById('payBtn').className = 'btn-primary btn-paypal'
    document.getElementById('payBtn').textContent = 'Pay with PayPal'
  } else {
    document.getElementById('payBtn').className = 'btn-primary btn-stripe'
    document.getElementById('payBtn').textContent = 'Pay with Credit Card'
  }
}

function showProcessing(msg) {
  state.processing = true
  document.getElementById('processingMsg').textContent = msg || 'Processing your payment...'
  document.getElementById('processingOverlay').style.display = 'flex'
}

function hideProcessing() {
  state.processing = false
  document.getElementById('processingOverlay').style.display = 'none'
}

async function payWithPoints() {
  if (!state.email) { showError('Enter your email'); return }
  showProcessing('Redeeming points...')
  try {
    const res = await fetch('/api/pay/points', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: state.email, plan: state.plan })
    })
    const data = await res.json()
    hideProcessing()
    if (data.success) { showSuccess('Paid with points!') }
    else { showError(data.error || 'Points payment failed') }
  } catch (err) {
    hideProcessing()
    showError(err.message)
  }
}

async function pay() {
  if (!state.email) { showError('Enter your email'); return }
  if (!state.selectedMethod) { showError('Select a payment method'); return }
  hideError()
  showProcessing('Trying ' + state.selectedMethod + '...')

  try {
    const res = await fetch('/api/pay/process', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: state.email, name: '', plan: state.plan, preferredMethod: state.selectedMethod })
    })
    const data = await res.json()
    hideProcessing()

    if (data.success && data.result?.url) {
      window.location.href = data.result.url
      return
    }
    if (data.success && data.result?.manual) {
      showManual(data.result)
      return
    }
    if (data.success) {
      showSuccess('Payment initiated!')
      return
    }
    showError(data.error || 'Payment failed. Please try another method.')
  } catch (err) {
    hideProcessing()
    showError(err.message)
  }
}

function getPoints() {
  window.location.href = '/credits?email=' + encodeURIComponent(state.email) + '&return=' + encodeURIComponent(window.location.href)
}

function showError(msg) {
  const el = document.getElementById('error')
  el.textContent = msg; el.style.display = 'block'
}

function hideError() {
  document.getElementById('error').style.display = 'none'
}

function showSuccess(msg) {
  document.getElementById('checkout-view').style.display = 'none'
  document.getElementById('manual-view').style.display = 'none'
  document.getElementById('successMsg').textContent = msg
  document.getElementById('success-view').style.display = 'block'
}

function showManual(details) {
  document.getElementById('checkout-view').style.display = 'none'
  document.getElementById('success-view').style.display = 'none'
  const html = []
  if (details.addresses?.usdt) html.push('<div><strong>USDT (TRC20):</strong><br><code>' + details.addresses.usdt + '</code></div>')
  if (details.addresses?.btc) html.push('<div><strong>Bitcoin:</strong><br><code>' + details.addresses.btc + '</code></div>')
  if (details.bankDetails) {
    if (details.bankDetails.iban) html.push('<div><strong>IBAN:</strong> ' + details.bankDetails.iban + '</div>')
    if (details.bankDetails.bic) html.push('<div><strong>BIC:</strong> ' + details.bankDetails.bic + '</div>')
    if (details.bankDetails.bankName) html.push('<div><strong>Bank:</strong> ' + details.bankDetails.bankName + '</div>')
    if (details.reference) html.push('<div><strong>Reference:</strong> <code>' + details.reference + '</code></div>')
  }
  if (details.paypalEmail) html.push('<div><strong>Send to:</strong> ' + details.paypalEmail + '</div>')
  html.push('<div><strong>Amount:</strong> €' + (details.amount || state.plan.price_sell) + '</div>')
  document.getElementById('manualDetails').innerHTML = html.join('')
  document.getElementById('manual-view').style.display = 'block'
}

function showCheckout() {
  document.getElementById('success-view').style.display = 'none'
  document.getElementById('manual-view').style.display = 'none'
  document.getElementById('checkout-view').style.display = 'block'
}

function goBack() { window.location.href = '/' }
function done() { window.location.href = '/payment/success' }

function init(plan) {
  state.plan = plan
  document.getElementById('loading-view').style.display = 'none'
  document.getElementById('checkout-view').style.display = 'block'

  const summary = document.getElementById('planSummary')
  summary.innerHTML =
    '<div class="summary-row"><span class="summary-label">Plan</span><span class="summary-value">' + (plan.name || 'Plan') + '</span></div>' +
    '<div class="summary-row"><span class="summary-label">Duration</span><span class="summary-value">' + (plan.duration || '') + '</span></div>' +
    '<div class="summary-row"><span class="summary-label">Total</span><span class="price">€' + (plan.price_sell || '0') + '</span></div>'

  document.getElementById('emailInput').addEventListener('input', updatePoints)
  if (document.getElementById('emailInput').value) updatePoints()
}

const params = new URLSearchParams(window.location.search)
const planParam = params.get('plan')
const lpParam = params.get('lp')
const keywordParam = params.get('keyword')

function fetchPlansAndInit() {
  fetch('/api/internal/plans' + (lpParam ? '?keyword=' + encodeURIComponent(keywordParam || lpParam) : ''))
    .then(r => r.json())
    .then(plans => {
      if (Array.isArray(plans) && plans.length > 0) {
        const matched = keywordParam ? plans.find(p => p.name?.toLowerCase().includes(keywordParam.toLowerCase()) || p.id?.toLowerCase().includes(keywordParam.toLowerCase())) : null
        init(matched || plans[0])
      } else {
        document.getElementById('loading-view').innerHTML = '<div style="color:#e94560">No plans available</div>'
      }
    })
    .catch(() => {
      document.getElementById('loading-view').innerHTML = '<div style="color:#888">Unable to load plans</div>'
    })
}

if (planParam) {
  try { init(JSON.parse(decodeURIComponent(planParam))) }
  catch { document.getElementById('loading-view').innerHTML = '<div style="color:#e94560">Invalid plan data</div>' }
} else if (lpParam || keywordParam) {
  fetchPlansAndInit()
} else {
  document.getElementById('loading-view').innerHTML = '<div style="color:#888">No plan specified</div>'
}
</script>
</body>
</html>

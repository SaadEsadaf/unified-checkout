<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buy Points</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { font-family:system-ui,-apple-system,sans-serif; background:#0a0a0f; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center }
.panel { background:linear-gradient(145deg,#111,#1a1a2e); border:1px solid #2a2a4a; border-radius:20px; padding:32px; width:100%; max-width:440px; margin:20px }
h1 { font-size:22px; background:linear-gradient(135deg,#f59e0b,#ef4444); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; margin-bottom:4px }
.sub { color:#888; font-size:13px; margin-bottom:24px }
.info { background:#0d0d1e; border-radius:10px; padding:16px; margin-bottom:20px; font-size:13px; color:#ccc; line-height:1.6 }
.pkg { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; background:#0d0d1e; border:2px solid #2a2a4a; border-radius:10px; margin-bottom:10px; cursor:pointer; transition:all 0.2s }
.pkg:hover { border-color:#f59e0b }
.pkg.selected { border-color:#f59e0b; background:#1a1a2e }
.pkg-price { font-size:18px; font-weight:700; color:#f59e0b }
.pkg-label { font-weight:600; font-size:14px }
.pkg-desc { color:#666; font-size:12px }
.pkg-bonus { font-size:11px; color:#00cc66; padding:2px 8px; background:#00cc6620; border-radius:4px }
.form-group { margin-bottom:16px }
.form-group label { display:block; color:#888; font-size:13px; margin-bottom:6px }
.form-group input { width:100%; padding:12px 16px; background:#0d0d1e; border:1px solid #2a2a4a; border-radius:10px; color:#fff; font-size:14px; outline:none }
.form-group input:focus { border-color:#f59e0b }
.btn { width:100%; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; color:#fff; margin-top:8px; transition:opacity 0.2s }
.btn:hover { opacity:0.9 }
.btn:disabled { opacity:0.4; cursor:not-allowed }
.btn-paypal { background:#0070ba }
.btn-card { background:linear-gradient(135deg,#6366f1,#8b5cf6) }
.btn-secondary { width:100%; padding:12px; background:none; border:1px solid #2a2a4a; border-radius:10px; color:#666; font-size:13px; cursor:pointer; margin-top:8px }
.btn-secondary:hover { color:#fff }
.error { color:#e94560; font-size:13px; padding:8px; background:#2a1520; border-radius:6px; margin-bottom:12px; display:none }
.or-divider { display:flex; align-items:center; gap:12px; margin:16px 0; color:#444; font-size:12px }
.or-divider::before, .or-divider::after { content:''; flex:1; height:1px; background:#1a1a2e }
.paypal-info { background:#0d0d1e; border-radius:8px; padding:12px; font-size:12px; color:#888; margin-top:8px; display:none }
.paypal-info strong { color:#ccc }
</style>
</head>
<body>
<div class="panel">
  <h1>⚡ Buy Points</h1>
  <p class="sub">Prepaid credits — no chargeback risk, instant activation</p>

  <div class="info">
    <div>💡 <strong>Why use points?</strong></div>
    <div style="margin-top:6px">• Zero chargeback risk</div>
    <div>• Instant activation</div>
    <div>• 1 point = €0.01</div>
  </div>

  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="emailInput" placeholder="your@email.com" value="">
  </div>

  <div style="font-size:13px;color:#888;margin-bottom:12px">Choose amount:</div>
  <div id="pkgList"></div>

  <div id="customAmount" style="display:none" class="form-group">
    <label>Custom amount (€)</label>
    <input type="number" id="customAmountInput" placeholder="10" min="5" step="1">
  </div>

  <button class="btn btn-paypal" id="paypalBtn" onclick="buyWithPayPal()">🅿️ Pay with PayPal</button>

  <div class="or-divider">or</div>

  <button class="btn btn-card" id="cardBtn" onclick="buyWithCard()">💳 Pay with Credit Card</button>

  <div class="paypal-info" id="paypalInfo">
    <div><strong>PayPal Email:</strong> iboplayer.service@gmail.com</div>
    <div style="margin-top:4px">Send exact amount as Friends & Family. Points credited after payment confirmation.</div>
  </div>

  <button class="btn-secondary" onclick="goBack()">Cancel</button>
  <div class="error" id="err"></div>
</div>

<script>
const PKGS = [
  { label: 'Starter', price: 10, bonus: 0, desc: '€10 — 1000 pts' },
  { label: 'Popular', price: 25, bonus: 10, desc: '€25 — 2750 pts (10% bonus)', popular: true },
  { label: 'Pro', price: 50, bonus: 20, desc: '€50 — 6000 pts (20% bonus)' },
  { label: 'Premium', price: 100, bonus: 25, desc: '€100 — 12500 pts (25% bonus)' },
  { label: 'Custom', price: 0, bonus: 0, desc: 'Choose your own amount', custom: true },
]

let selectedPkg = null
const params = new URLSearchParams(window.location.search)
const prefillEmail = params.get('email') || ''
if (prefillEmail) document.getElementById('emailInput').value = prefillEmail

function render() {
  const list = document.getElementById('pkgList')
  list.innerHTML = PKGS.map((p, i) => `
    <div class="pkg ${selectedPkg?.label === p.label ? 'selected' : ''}" onclick="selectPkg(${i})">
      <div>
        <div class="pkg-label">${p.label} ${p.popular ? '<span style="font-size:10px;background:#00cc66;color:#fff;padding:1px 6px;border-radius:4px;margin-left:4px">Best</span>' : ''}</div>
        <div class="pkg-desc">${p.desc}</div>
      </div>
      <div style="text-align:right">
        <div class="pkg-price">€${p.price > 0 ? p.price : '—'}</div>
        ${p.bonus > 0 ? `<div class="pkg-bonus">+${p.bonus}%</div>` : ''}
      </div>
    </div>
  `).join('')
  document.getElementById('customAmount').style.display = selectedPkg?.custom ? 'block' : 'none'
}
render()

function selectPkg(i) {
  selectedPkg = PKGS[i]
  document.querySelectorAll('.pkg').forEach((el, idx) => el.classList.toggle('selected', idx === i))
  document.getElementById('customAmount').style.display = selectedPkg.custom ? 'block' : 'none'
  document.getElementById('paypalBtn').disabled = false
  document.getElementById('cardBtn').disabled = false
}

function getAmount() {
  const email = document.getElementById('emailInput').value.trim()
  if (!email) { showErr('Enter your email'); return null }
  if (!selectedPkg) { showErr('Select an amount'); return null }
  let amount = selectedPkg.price
  if (selectedPkg.custom) {
    amount = parseFloat(document.getElementById('customAmountInput').value)
    if (!amount || amount < 5) { showErr('Minimum €5'); return null }
  }
  return { email, amount }
}

async function buyWithPayPal() {
  const r = getAmount()
  if (!r) return
  document.getElementById('paypalBtn').disabled = true
  document.getElementById('paypalBtn').textContent = 'Redirecting to PayPal...'
  try {
    const res = await fetch('/api/credits/purchase', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: r.email, name: '', amount: r.amount, website_id: 1 })
    })
    const data = await res.json()
    if (data.success && data.url) { window.location.href = data.url; return }
    if (data.success && data.manual) { showManual(data); return }
    showErr(data.error || 'Purchase failed')
  } catch (err) { showErr(err.message) }
  document.getElementById('paypalBtn').disabled = false
  document.getElementById('paypalBtn').textContent = '🅿️ Pay with PayPal'
}

async function buyWithCard() {
  const r = getAmount()
  if (!r) return
  document.getElementById('cardBtn').disabled = true
  document.getElementById('cardBtn').textContent = 'Redirecting...'
  try {
    const res = await fetch('/api/credits/purchase', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: r.email, name: '', amount: r.amount, website_id: 1 })
    })
    const data = await res.json()
    if (data.success && data.url) { window.location.href = data.url; return }
    if (data.success && data.manual) { showManual(data); return }
    showErr(data.error || 'Purchase failed')
  } catch (err) { showErr(err.message) }
  document.getElementById('cardBtn').disabled = false
  document.getElementById('cardBtn').textContent = '💳 Pay with Credit Card'
}

function showManual(data) {
  const info = document.getElementById('paypalInfo')
  info.style.display = 'block'
  if (data.details?.paypalEmail) {
    info.innerHTML = '<div><strong>Send to:</strong> ' + data.details.paypalEmail + '</div><div style="margin-top:4px"><strong>Amount:</strong> €' + (data.details.amount || '') + '</div>'
  }
}

function showErr(msg) {
  const el = document.getElementById('err')
  el.textContent = msg; el.style.display = 'block'
}

function goBack() {
  const ret = params.get('return') || '/'
  window.location.href = ret
}
</script>
</body>
</html>
